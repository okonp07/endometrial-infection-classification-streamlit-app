name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-ci.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest

      - name: Compile source files
        env:
          PYTHONPATH: src
        run: python -m compileall app.py src tests scripts
